{% extends "base_pwa.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-8">
    <div class="w-full max-w-lg bg-white dark:bg-dark-800 p-6 sm:p-8 rounded-2xl shadow-xl border border-gray-200 dark:border-dark-700 transition-all duration-300">
        
        <!-- هدر فرم -->
        <div class="text-center mb-8">
            <div class="mx-auto h-16 w-16 bg-gradient-to-br from-gold to-gold-dark rounded-full flex items-center justify-center shadow-lg shadow-gold/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-dark-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
            </div>
            <h2 class="mt-4 text-2xl font-bold text-gray-900 dark:text-white">Edit Profile</h2>
            <p class="text-gray-600 dark:text-slate-400 text-sm">Update your account information</p>
        </div>

        <!-- فرم ویرایش -->
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <!-- نام شرکت -->
            <div>
                <label for="company" class="form-label">Company Name</label>
                <input id="company" name="company" type="text"
                       class="form-input"
                       placeholder="Royan Export Co."
                       value="{{ current_user.company_name or '' }}">
            </div>

            <!-- کشور -->
            <div>
                <label for="country" class="form-label">Country *</label>
                <input id="country" name="country" type="text" required
                       class="form-input"
                       placeholder="Iran"
                       value="{{ current_user.country or '' }}">
            </div>

            <!-- تلفن -->
            <div>
                    <label for="phone" class="form-label">Phone Number</label>
                <input id="phone" name="phone" type="tel"
                       class="form-input"
                       placeholder="+98 912 345 6789"
                       value="{{ current_user.phone or '' }}">
            </div>

            <!-- دکمه ذخیره -->
            <div class="pt-4">
                <button type="submit"
                        class="w-full flex justify-center py-3.5 px-6 rounded-xl shadow-lg text-sm font-bold text-dark-900 
                               bg-gradient-to-r from-gold to-gold-dark 
                               hover:from-gold-light hover:to-gold 
                               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gold 
                               transform hover:scale-[1.02] active:scale-[0.98] 
                               transition-all duration-200">
                    Save Changes
                </button>
            </div>
        </form>

        <!-- لینک بازگشت -->
        <div class="text-center pt-6 border-t border-gray-200 dark:border-dark-700">
            <a href="{{ url_for('users.profile') }}" 
               class="inline-flex items-center gap-2 text-gray-600 dark:text-slate-400 hover:text-gold transition text-sm">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Return to Profile
            </a>
        </div>
    </div>
</div>
{% endblock %}
