{% extends "base_pwa.html" %}

{% block title %}Place New Order{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-8">
    <div class="w-full max-w-2xl bg-white dark:bg-dark-800 p-6 sm:p-8 rounded-2xl shadow-xl border border-gray-200 dark:border-dark-700 transition-all duration-300">
        
        <!-- هدر فرم -->
        <div class="text-center mb-8">
            <div class="mx-auto h-16 w-16 bg-gradient-to-br from-gold to-gold-dark rounded-full flex items-center justify-center shadow-lg shadow-gold/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-dark-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                </svg>
            </div>
            <h2 class="mt-4 text-2xl font-bold text-gray-900 dark:text-white">Place New Order</h2>
            <p class="text-gray-600 dark:text-slate-400 text-sm">Complete your export or import order details</p>
        </div>

        <!-- فرم ثبت سفارش -->
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <!-- محصول -->
            <div>
                <label for="product" class="form-label">Product *</label>
                <select id="product" name="product" required class="form-input cursor-pointer">
                    <option value="" disabled selected>Select product...</option>
                    <option value="wheat">🌾 Wheat</option>
                    <option value="rice">🍚 Rice</option>
                    <option value="sugar">🍬 Sugar</option>
                    <option value="corn">🌽 Corn</option>
                    <option value="steel">🏗️ Steel</option>
                    <option value="other">📦 Other</option>
                </select>
            </div>

            <!-- گرید مقدار و قیمت -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="quantity" class="form-label">Quantity (Tons) *</label>
                    <input id="quantity" name="quantity" type="number" min="1" step="0.1" required
                           class="form-input"
                           placeholder="e.g., 50">
                </div>
                <div>
                    <label for="price" class="form-label">Price per Ton (USD) *</label>
                    <input id="price" name="price" type="number" min="1" step="0.01" required
                           class="form-input"
                           placeholder="e.g., 350.00">
                </div>
            </div>

            <!-- بنادر مبدأ و مقصد -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="origin_port" class="form-label">Origin Port *</label>
                    <input id="origin_port" name="origin_port" type="text" required
                           class="form-input"
                           placeholder="e.g., Bandar Abbas">
                </div>
                <div>
                    <label for="destination_port" class="form-label">Destination Port *</label>
                    <input id="destination_port" name="destination_port" type="text" required
                           class="form-input"
                           placeholder="e.g., Sohar">
                </div>
            </div>

            <!-- انتخاب تولیدکننده -->
            <div>
                <label for="producer" class="form-label">Select Producer *</label>
                <select id="producer" name="seller_id" required class="form-input cursor-pointer">
                    <option value="" disabled selected>Choose a verified producer...</option>
                    {% for seller in sellers %}
                    <option value="{{ seller.id }}">
                        {{ seller.username }} {% if seller.company_name %}({{ seller.company_name }}){% endif %} - {{ seller.country }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- توضیحات اضافی -->
            <div>
                <label for="notes" class="form-label">Additional Notes <span class="text-gray-400">(Optional)</span></label>
                <textarea id="notes" name="notes" rows="3"
                          class="form-input resize-none"
                          placeholder="Specify quality, packaging, delivery terms, etc."></textarea>
            </div>

            <!-- دکمه ثبت -->
            <div class="pt-4">
                <button type="submit"
                        class="w-full flex justify-center py-3.5 px-6 rounded-xl shadow-lg text-sm font-bold text-dark-900 
                               bg-gradient-to-r from-gold to-gold-dark 
                               hover:from-gold-light hover:to-gold 
                               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gold 
                               transform hover:scale-[1.02] active:scale-[0.98] 
                               transition-all duration-200">
                    Place Order
                </button>
            </div>
        </form>

        <!-- لینک بازگشت -->
        <div class="text-center pt-6 border-t border-gray-200 dark:border-dark-700">
            <a href="{{ url_for('users.profile') }}" 
               class="inline-flex items-center gap-2 text-gray-600 dark:text-slate-400 hover:text-gold transition text-sm">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Return to Profile
            </a>
        </div>
    </div>
</div>
{% endblock %}
