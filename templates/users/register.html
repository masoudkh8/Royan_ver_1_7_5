<!-- templates/users/register.html -->
{% extends "base_pwa.html" %}

{% block title %}Register - Metisma{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-8">
    <div class="w-full max-w-lg bg-white dark:bg-dark-800 p-6 sm:p-8 rounded-2xl shadow-xl border border-gray-200 dark:border-dark-700 transition-all duration-300 hover:shadow-2xl">
        
        <!-- هدر فرم: لوگو و عنوان -->
        <div class="text-center mb-8">
            <div class="mx-auto h-16 w-16 bg-gradient-to-br from-gold to-gold-dark rounded-full flex items-center justify-center shadow-lg shadow-gold/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-dark-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
            </div>
            <h2 class="mt-4 text-2xl font-bold text-gray-900 dark:text-white">Create Account</h2>
            <p class="text-gray-600 dark:text-slate-400 text-sm">Join Metisma global trade network</p>
        </div>

        <!-- فرم ثبت‌نام -->
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <!-- نام کاربری -->
            <div>
                <label for="username" class="form-label">Username *</label>
                <input id="username" name="username" type="text" required
                       class="form-input"
                       placeholder="e.g., royan_export">
            </div>

            <!-- ایمیل -->
            <div>
                <label for="email" class="form-label">Email *</label>
                <input id="email" name="email" type="email" required
                        class="form-input peer"
						placeholder="ali@example.com"
						pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
				<p class="hidden peer-invalid:block text-sm text-red-500 mt-1">
					Please enter a valid email address
				</p>
            </div>
     

            <!-- رمز عبور -->
            <div>
                <label for="password" class="form-label">Password *</label>
                <input id="password" name="password" type="password" required
                       class="form-input"
                       placeholder="••••••••">
                <p class="mt-1 text-xs text-gray-500 dark:text-slate-500">Minimum 8 characters with letters and numbers</p>
            </div>

            <!-- نقش کاربر -->
            <div>
                <label for="role" class="form-label">Your Role *</label>
                <select id="role" name="role" required
                        class="form-input cursor-pointer">
                    <option value="" disabled selected>Select your role...</option>
                    <option value="buyer">🛒 Buyer (Importer)</option>
                    <option value="producer">🏭 Producer (Exporter)</option>
                    <option value="broker">🤝 Broker / Agent</option>
                </select>
            </div>

            <!-- نام شرکت (اختیاری) -->
            <div>
                <label for="company" class="form-label">Company Name <span class="text-gray-400">(Optional)</span></label>
                <input id="company" name="company" type="text"
                       class="form-input"
                       placeholder="Royan Export Co.">
            </div>

            <!-- کشور -->
            <div>
                <label for="country" class="form-label">Country *</label>
                <input id="country" name="country" type="text" required
                       class="form-input"
                       placeholder="Iran">
            </div>

            <!-- تلفن (اختیاری) -->
            <div>
                <label for="phone" class="form-label">Phone Number <span class="text-gray-400">(Optional)</span></label>
                <input id="phone" name="phone" type="tel"
                       class="form-input"
                       placeholder="+98 912 345 6789">
            </div>

            <!-- قوانین و حریم خصوصی -->
            <div class="flex items-start pt-2">
                <input id="terms" name="terms" type="checkbox" required
                       class="mt-1 h-4 w-4 rounded border-gray-300 dark:border-dark-600 text-gold focus:ring-gold dark:bg-dark-700">
                <label for="terms" class="ml-2 block text-sm text-gray-700 dark:text-slate-300">
                    I agree to the <a href="#" class="text-gold hover:text-gold-light underline">Terms of Service</a> and <a href="#" class="text-gold hover:text-gold-light underline">Privacy Policy</a>
                </label>
            </div>

            <!-- دکمه ثبت‌نام -->
            <div class="pt-4">
                <button type="submit"
                        class="w-full flex justify-center py-3.5 px-6 rounded-xl shadow-lg text-sm font-bold text-dark-900 
                               bg-gradient-to-r from-gold to-gold-dark 
                               hover:from-gold-light hover:to-gold 
                               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gold 
                               transform hover:scale-[1.02] active:scale-[0.98] 
                               transition-all duration-200">
                    Create Account
                </button>
            </div>
        </form>

        <!-- لینک ورود -->
        <div class="text-center pt-6 border-t border-gray-200 dark:border-dark-700">
            <p class="text-sm text-gray-600 dark:text-slate-400">
                Already have an account?
                <a href="{{ url_for('users.login') }}" class="font-semibold text-gold hover:text-gold-light transition">
                    Log in
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
