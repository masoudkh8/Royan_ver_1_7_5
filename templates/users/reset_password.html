{% extends "base_pwa.html" %}

{% block title %}تنظیم رمز عبور جدید - متیسما{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl">
        <div>
            <div class="text-center">
                <div class="mx-auto h-16 w-16 bg-gradient-to-r from-green-600 to-emerald-600 rounded-full flex items-center justify-center">
                    <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h2 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-white">تنظیم رمز عبور جدید</h2>
                <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                    رمز عبور جدید خود را وارد کنید
                </p>
            </div>
        </div>

        <form class="mt-8 space-y-6" method="POST" action="{{ url_for('users.reset_password', token=token) }}">
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                    رمز عبور جدید
                </label>
                <div class="mt-1">
                    <input id="password" name="password" type="password" autocomplete="new-password" required 
                           minlength="8"
                           class="appearance-none block w-full px-4 py-3 border border-gray-300 dark:border-gray-600 
                                  placeholder-gray-500 dark:placeholder-gray-400 
                                  rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 
                                  focus:border-green-500 dark:bg-gray-700 dark:text-white
                                  transition duration-150 ease-in-out"
                           placeholder="حداقل ۸ کاراکتر" dir="ltr">
                </div>
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
                    باید حداقل ۸ کاراکتر باشد
                </p>
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                    تکرار رمز عبور
                </label>
                <div class="mt-1">
                    <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required 
                           minlength="8"
                           class="appearance-none block w-full px-4 py-3 border border-gray-300 dark:border-gray-600 
                                  placeholder-gray-500 dark:placeholder-gray-400 
                                  rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 
                                  focus:border-green-500 dark:bg-gray-700 dark:text-white
                                  transition duration-150 ease-in-out"
                           placeholder="تکرار رمز عبور" dir="ltr">
                </div>
            </div>

            <div>
                <button type="submit" 
                        class="w-full flex justify-center py-3 px-4 border border-transparent 
                               rounded-lg shadow-sm text-sm font-medium text-white 
                               bg-gradient-to-r from-green-600 to-emerald-600 
                               hover:from-green-700 hover:to-emerald-700 
                               focus:outline-none focus:ring-2 focus:ring-offset-2 
                               focus:ring-green-500 transition duration-150 ease-in-out">
                    <svg class="ml-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    تغییر رمز عبور
                </button>
            </div>
        </form>

        <div class="mt-6 p-4 bg-yellow-50 dark:bg-yellow-900/20 rounded-lg border border-yellow-200 dark:border-yellow-800">
            <p class="text-sm text-yellow-800 dark:text-yellow-200">
                <strong>⚠️ توجه:</strong> پس از تغییر رمز عبور، از تمام دستگاه‌های فعال خارج خواهید شد.
            </p>
        </div>
    </div>
</div>
{% endblock %}
