<!-- templates/users/reset_password.html -->
{% extends "base_pwa.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-12">
    <div class="w-full max-w-md space-y-8 bg-white dark:bg-dark-800 p-8 rounded-2xl shadow-xl border border-gray-200 dark:border-dark-700 transition-all duration-300 hover:shadow-2xl">

        <!-- Logo and Title -->
        <div class="text-center">
            <div class="mx-auto h-16 w-16 bg-gradient-to-br from-gold to-gold-dark rounded-full flex items-center justify-center shadow-lg shadow-gold/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-dark-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="mt-4 text-2xl font-bold text-gray-900 dark:text-white">Reset Password</h2>
            <p class="text-gray-600 dark:text-slate-400">Enter your new password below</p>
        </div>

        <!-- Reset Password Form -->
        <form class="mt-8 space-y-6" method="POST" action="{{ url_for('users.reset_password', token=token) }}" id="resetForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="space-y-4">
                <!-- New Password Field with visibility toggle -->
                <div>
                    <label for="password" class="form-label">New Password</label>
                    <div class="relative">
                        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8"
                               class="form-input pr-12"
                               placeholder="••••••••">
                        <button type="button" onclick="togglePassword('password', 'eyeIcon1')" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-600 transition"
                                aria-label="Toggle password visibility">
                            <svg id="eyeIcon1" class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                    <p class="mt-1 text-xs text-gray-500 dark:text-slate-400">
                        Must be at least 8 characters
                    </p>
                    <p class="mt-1 text-xs text-red-500 hidden" id="passwordError"></p>
                </div>

                <!-- Confirm Password Field with visibility toggle -->
                <div>
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <div class="relative">
                        <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required minlength="8"
                               class="form-input pr-12"
                               placeholder="••••••••">
                        <button type="button" onclick="togglePassword('confirm_password', 'eyeIcon2')" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-600 transition"
                                aria-label="Toggle password visibility">
                            <svg id="eyeIcon2" class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                    <p class="mt-1 text-xs text-red-500 hidden" id="confirmPasswordError"></p>
                </div>
                
                <!-- Password Strength Meter -->
                <div class="mt-2">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-xs text-gray-500 dark:text-slate-400">Strength:</span>
                        <div class="flex-1 h-2 bg-gray-200 dark:bg-dark-700 rounded-full overflow-hidden">
                            <div id="strengthBar" class="h-full w-0 transition-all duration-300"></div>
                        </div>
                    </div>
                    <p id="strengthText" class="text-xs text-gray-500 dark:text-slate-400"></p>
                </div>
            </div>

            <!-- Submit Button -->
            <div>
                <button type="submit" id="submitBtn"
                        class="w-full flex justify-center py-3 px-4 rounded-lg shadow-sm text-sm font-bold text-dark-900 
                               bg-gradient-to-r from-gold to-gold-dark 
                               hover:from-gold-light hover:to-gold 
                               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gold 
                               transform hover:scale-[1.02] active:scale-[0.98] 
                               transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="submitBtnText">Change Password</span>
                    <svg id="submitSpinner" class="hidden animate-spin ml-2 h-5 w-5 text-dark-900" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </form>

        <!-- Warning Box -->
        <div class="mt-6 p-4 bg-yellow-50 dark:bg-yellow-900/20 rounded-lg border border-yellow-200 dark:border-yellow-800">
            <p class="text-sm text-yellow-800 dark:text-yellow-200">
                <strong>⚠️ Notice:</strong> After changing your password, you will be logged out from all active sessions.
            </p>
        </div>
    </div>
</div>

<script>
// Toggle password visibility
function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    
    if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
    } else {
        input.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
    }
}

// Password strength meter
function checkPasswordStrength(password) {
    let strength = 0;
    const bar = document.getElementById('strengthBar');
    const text = document.getElementById('strengthText');
    
    if (password.length >= 8) strength++;
    if (password.length >= 12) strength++;
    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
    if (/\d/.test(password)) strength++;
    if (/[^a-zA-Z0-9]/.test(password)) strength++;
    
    // Update UI
    if (strength <= 2) {
        bar.className = 'h-full w-1/4 bg-red-500 transition-all duration-300';
        text.textContent = 'Weak';
        text.className = 'text-xs text-red-500';
    } else if (strength <= 3) {
        bar.className = 'h-full w-2/4 bg-yellow-500 transition-all duration-300';
        text.textContent = 'Medium';
        text.className = 'text-xs text-yellow-500';
    } else if (strength <= 4) {
        bar.className = 'h-full w-3/4 bg-blue-500 transition-all duration-300';
        text.textContent = 'Strong';
        text.className = 'text-xs text-blue-500';
    } else {
        bar.className = 'h-full w-full bg-green-500 transition-all duration-300';
        text.textContent = 'Very Strong';
        text.className = 'text-xs text-green-500';
    }
    
    return strength;
}

// Real-time password strength check
document.getElementById('password').addEventListener('input', function(e) {
    checkPasswordStrength(e.target.value);
});

// Client-side validation
document.getElementById('resetForm').addEventListener('submit', function(e) {
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    const passwordError = document.getElementById('passwordError');
    const confirmPasswordError = document.getElementById('confirmPasswordError');
    let isValid = true;

    // Password validation
    if (password.value.length < 8) {
        passwordError.textContent = 'Password must be at least 8 characters';
        passwordError.classList.remove('hidden');
        password.classList.add('border-red-500');
        isValid = false;
    } else {
        passwordError.classList.add('hidden');
        password.classList.remove('border-red-500');
    }

    // Confirm password match validation
    if (confirmPassword.value !== password.value) {
        confirmPasswordError.textContent = 'Passwords do not match';
        confirmPasswordError.classList.remove('hidden');
        confirmPassword.classList.add('border-red-500');
        isValid = false;
    } else if (confirmPassword.value.length > 0) {
        confirmPasswordError.classList.add('hidden');
        confirmPassword.classList.remove('border-red-500');
    }

    if (!isValid) {
        e.preventDefault();
        return;
    }

    // Show loading state
    const submitBtn = document.getElementById('submitBtn');
    const submitBtnText = document.getElementById('submitBtnText');
    const submitSpinner = document.getElementById('submitSpinner');
    
    submitBtn.disabled = true;
    submitBtnText.textContent = 'Changing...';
    submitSpinner.classList.remove('hidden');
});
</script>
{% endblock %}
