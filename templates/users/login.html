<!-- templates/users/login.html -->
{% extends "base_pwa.html" %}

{% block title %}Login to the account{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-12">
    <div class="w-full max-w-md space-y-8 bg-white dark:bg-dark-800 p-8 rounded-2xl shadow-xl border border-gray-200 dark:border-dark-700 transition-all duration-300 hover:shadow-2xl">

        <!-- لوگو و عنوان -->
        <div class="text-center">
            <div class="mx-auto h-16 w-16 bg-gradient-to-br from-gold to-gold-dark rounded-full flex items-center justify-center shadow-lg shadow-gold/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-dark-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v3m-3-3h6M6 10h12M6 6h12M6 14h12M6 18h12" />
                </svg>
            </div>
            <h2 class="mt-4 text-2xl font-bold text-gray-900 dark:text-white">Welcome</h2>
            <p class="text-gray-600 dark:text-slate-400">Log in to the Metisma platform</p>
        </div>

        <!-- فرم ورود -->
        <form class="mt-8 space-y-6" method="POST" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="space-y-4">
                <!-- فیلد ایمیل -->
                <div>
                    <label for="email" class="form-label">Email</label>
                    <input id="email" name="email" type="email" required
                           class="form-input"
                           placeholder="you@example.com"
                           pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
                    <p class="mt-1 text-xs text-gray-500 dark:text-slate-400 hidden" id="emailError"></p>
                </div>
                
                <!-- فیلد رمز عبور با دکمه نمایش -->
                <div>
                    <label for="password" class="form-label">Password</label>
                    <div class="relative">
                        <input id="password" name="password" type="password" required
                               class="form-input pr-12"
                               placeholder="••••••••" minlength="8">
                        <button type="button" onclick="togglePassword()" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-600 transition"
                                aria-label="Toggle password visibility">
                            <svg id="eyeIcon" class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                    <p class="mt-1 text-xs text-gray-500 dark:text-slate-400 hidden" id="passwordError"></p>
                </div>
            </div>

            <!-- گزینه‌های اضافی -->
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember" name="remember" type="checkbox"
                           class="h-4 w-4 rounded border-gray-300 dark:border-dark-600 text-gold focus:ring-gold dark:bg-dark-700">
                    <label for="remember" class="ml-2 block text-sm text-gray-700 dark:text-slate-300">
                        Remember me
                    </label>
                </div>
                 <a href="{{ url_for('users.forgot_password') }}" class="text-sm text-gold hover:text-gold-light transition">
                    Forgot password?
                </a>
            </div>

            <!-- دکمه ورود -->
            <div>
                <button type="submit" id="loginBtn"
                        class="w-full flex justify-center py-3 px-4 rounded-lg shadow-sm text-sm font-bold text-dark-900 
                               bg-gradient-to-r from-gold to-gold-dark 
                               hover:from-gold-light hover:to-gold 
                               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gold 
                               transform hover:scale-[1.02] active:scale-[0.98] 
                               transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="loginBtnText">Login to the account</span>
                    <svg id="loginSpinner" class="hidden animate-spin ml-2 h-5 w-5 text-dark-900" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>

            <!-- لینک ثبت‌نام -->
            <div class="text-center pt-4 border-t border-gray-200 dark:border-dark-700">
                <p class="text-sm text-gray-600 dark:text-slate-400">
                    Don't have an account?
                    <a href="{{ url_for('users.register') }}" class="font-semibold text-gold hover:text-gold-light transition">
                       Sign up
                    </a>
                </p>
            </div>
        </form>

        <!-- Rate Limiting Warning -->
        <div class="mt-6 p-4 bg-yellow-50 dark:bg-yellow-900/20 rounded-lg border border-yellow-200 dark:border-yellow-800">
            <p class="text-sm text-yellow-800 dark:text-yellow-200">
                <strong>⚠️ Security Notice:</strong> Too many failed attempts will temporarily lock your account.
            </p>
        </div>
    </div>
</div>

<script>
// Toggle password visibility
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
    } else {
        passwordInput.type = 'password';
        eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
    }
}

// Client-side validation
document.getElementById('loginForm').addEventListener('submit', function(e) {
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    let isValid = true;

    // Email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email.value)) {
        emailError.textContent = 'Please enter a valid email address';
        emailError.classList.remove('hidden');
        email.classList.add('border-red-500');
        isValid = false;
    } else {
        emailError.classList.add('hidden');
        email.classList.remove('border-red-500');
    }

    // Password validation
    if (password.value.length < 8) {
        passwordError.textContent = 'Password must be at least 8 characters';
        passwordError.classList.remove('hidden');
        password.classList.add('border-red-500');
        isValid = false;
    } else {
        passwordError.classList.add('hidden');
        password.classList.remove('border-red-500');
    }

    if (!isValid) {
        e.preventDefault();
        return;
    }

    // Show loading state
    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');
    const loginSpinner = document.getElementById('loginSpinner');
    
    loginBtn.disabled = true;
    loginBtnText.textContent = 'Logging in...';
    loginSpinner.classList.remove('hidden');
});
</script>
{% endblock %}
